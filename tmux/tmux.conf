
# ── Terminal & Color ──────────────────────────────────────────────

set -g  default-terminal "tmux-256color"
set -ag terminal-features "*:RGB:usstyle:overline"

# ── General ───────────────────────────────────────────────────────

set -g mouse on

set -g  history-limit 50000
set -g  focus-events on
set -sg repeat-time 1000

set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on

set -g visual-activity off
set -g monitor-activity off

# yazi config (allow-passthrough & update-environment)
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g set-titles on
set -g display-panes-time 800
set -g display-time 1000

# redraw status line / pane bar every 20 seconds
set -g status-interval 20

# Switch to another session when the last window is killed, not exiting tmux directly.
set -g detach-on-destroy off

# ── Keyboard ──────────────────────────────────────────────────────

set -s  escape-time 10
setw -g xterm-keys on
set -s  extended-keys always
set -as terminal-features 'xterm*:extkeys'

# ── Clipboard  ───────────────────────────────────────────────────

set -s  set-clipboard on
set -g  allow-passthrough on

# ── Copy Mode (vi) ───────────────────────────────────────────────

set -g mode-keys vi

bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Y send -X copy-line
bind -T copy-mode-vi Escape send -X cancel

# 跨平台剪贴板:macOS 用 pbcopy,其他平台用 xclip
if-shell 'test "$(uname)" = "Darwin"' \
    'set -g @copy_command "pbcopy"' \
    'set -g @copy_command "xclip -selection clipboard"'
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "#{@copy_command}"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "#{@copy_command}"

# ── Reload Config ───────────────────────────────────────────────

# reload configuration
bind , source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf reloaded'

# ── Default Keybinds ────────────────────────────────────────────

# session
# prefix + s : show all sessions
# prefix + $ : rename currrent seesion
# prefix + d : detach seesion

# window
# prefix + w : show all windows
# prefix + c : new a window
# prefix + , : rename current window
# prefix + p : previous window
# prefix + n : next window
# prefix + 0-9 : switch to window

# ── Window Keys ─────────────────────────────────────────────────

# prefix + r : rename current window
unbind r
bind r command-prompt -I "#{window_name}" "rename-window '%%'"

# prefix + q : kill current window
unbind &
unbind q
bind-key -T prefix q kill-window

# prefix + S-Left & prefix + S-Right : switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

#  M is option on mac
# prefix + M-h & prefix + M-l : switch windows
bind -n M-h previous-window
bind -n M-l next-window

# prefix + C-l : clear screen
bind C-l send-keys C-l

# extended-keys 会把 Tab 编码成 CSI u 序列
# 部分 TUI (fish 命令补全等) 不识别,强制使用 Tab
bind -n Tab send-keys Tab

# ── Panes Keys ──────────────────────────────────────────────────

# prefix + x : close current pane without confirm
bind-key -T prefix x kill-pane

# `prefix + - `& `prefix + =` to Split to panes
unbind -
unbind =
bind - split-window -v -c "#{pane_current_path}"
bind = split-window -h -c "#{pane_current_path}"

# prefix + C-h/j/k/l : switch panes
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── Panes Config ────────────────────────────────────────────────

set -g @pane_color "#b294bb"
setw -g pane-border-status top
set -g pane-scrollbars off
set -g pane-scrollbars-position right
set -g pane-active-border-style fg=#b294bb
set -g pane-border-style fg=colour244
# Powerline style
set -g pane-border-format '#{?@is_sidebar,,#[fg=#{?pane_active,#{@pane_color},colour244}]#[bg=#{?pane_active,#{@pane_color},colour244}]#[fg=colour0]#($HOME/.config/tmux/scripts/pane_starship.sh #{pane_width} "#{pane_current_path}" "#{pane_current_command}")#[fg=#{?pane_active,#{@pane_color},colour244}]#[bg=default]#[default]}'

# default style
# set -g pane-border-format '#{?@is_sidebar,,#[fg=#{?pane_active,#{@pane_color},colour244}]#($HOME/.config/tmux/scripts/pane_starship.sh #{pane_width} "#{pane_current_path}" "#{pane_current_command}") #[default]}'

# ── Popup Config ────────────────────────────────────────────────

# 使用 Prefix + g 打开 lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"

# 使用 Prefix + t 打开新窗口(支持ctrl+d 直接退出)
bind t display-popup -d "#{pane_current_path}" -w 60% -h 60%  -E "fish"

# prefix + N : new session
bind N command-prompt -p "session name:" "new-session -s '%%'"

# command-prompt 的颜色由 message-style 控制,继承终端颜色
set -g message-style 'bg=default,fg=default'

# Worktree TUI: prefix+g opens a multi-select popup of the current repo's git
# worktrees. j/k move, space marks, a all, enter opens/jumps, d deletes marked
# (force, in-popup confirm), n new, r renames the worktree (git worktree move).
bind u display-popup -E -w 60% -h 65% -d "#{pane_current_path}" -T "#[align=centre] worktrees " "$HOME/.config/tmux/scripts/tmux-worktree.sh"

# Agent sidebar: prefix+\ docks a live agent list on the left
bind-key \\ run-shell "$HOME/.config/tmux/scripts/tmux-sidebar.sh"

# Clean up orphan agent state files when a pane is destroyed
set-hook -g pane-died "run-shell 'rm -f /tmp/agent-state-#{pane_id}'"

# ── Status Bar ───────────────────────────────────────────────────

set -g @bg  "default"
set -g @red "#fb4934"
set-option -g status-justify centre
set-option -g status-style "bg=#{@bg}"
set-option -g status-left "#[bg=#{@bg},bold] [ #S ] "
set-option -g status-left-length 50
set-option -g status-left-style default
set-option -g status-right "#[bold]%Y-%m-%d %H:%M "
set-option -g status-right-length 50
set-option -g status-right-style default

set-option -g window-status-format "#[bold] #I:#W "
set-option -g window-status-current-format "#[bold] #I:#W "
set-option -g window-status-current-style "bg=#{@bg},fg=#{@red}"
set-option -g window-status-separator ""
set-option -g window-status-activity-style none

# ── Plugins ──────────────────────────────────────────────────────
# prefix + I : Installs new plugins
# prefix + U : updates plugin
# prefix + option + u : remove/uninstall plugins

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
