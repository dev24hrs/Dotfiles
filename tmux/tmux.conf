set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ------------------- general settings -------------------
setw -g xterm-keys on
set -g  default-terminal "tmux-256color"
set -ag terminal-features "*:RGB"

# yazi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# escape-time / history-limit / focus-events / aggressive-resize 由 tmux-sensible 提供
set -sg repeat-time 1000

set -s set-clipboard on
set -g mouse on

setw -g pane-base-index 1

set -g visual-activity off

# reload configuration
bind , source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf reloaded'

# ------------------- display ---------------------------
set -g base-index 1           # start windows numbering at 1
set -g renumber-windows on    # renumber windows when a window is closed
set -g set-titles on          # set terminal title
set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time
set -g status-interval 30     # redraw status line every 30 seconds

# activity
set -g monitor-activity off

# 杀掉最后一个 window 时切到另一个 session,而不是直接退出 tmux
set -g detach-on-destroy off

# --------------------Vim model---------------------------
set -g mode-keys vi

bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Y send -X copy-line
bind -T copy-mode-vi Escape send -X cancel

# 跨平台剪贴板:macOS 用 pbcopy,其他平台用 xclip
if-shell 'test "$(uname)" = "Darwin"' \
    'set -g @copy_command "pbcopy"' \
    'set -g @copy_command "xclip -selection clipboard"'
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "#{@copy_command}"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "#{@copy_command}"

# defaukl keybinds
# ----------------------------------------------------

# session
# prefix + s : show all sessions
# prefix + $ : rename currrent seesion
# prefix + d : detach seesion

# window
# prefix + w : show all windows
# prefix + c : new a window
# prefix + , : rename current window
unbind r
bind r command-prompt -I "#{window_name}" "rename-window '%%'"
# -----------------------------------------------------

# extended-keys 会把 Tab 编码成 CSI u 序列,部分 TUI (fish 命令补全等) 不识别,
# 这里强制透传原始 Tab 字符。
bind -n Tab send-keys Tab

# Close current window
unbind &
unbind q
unbind space
bind-key -T prefix q kill-window

# Shift-arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# default keys to swicth windows
# prefix + p : previous window
# prefix + n : next window
# prefix + 0-9 : switch to window

# Panes
# ----------------------------------------------------

# prefix + x : close current pane without confirm
bind-key -T prefix x kill-pane

# `prefix + - `& `prefix + \` to Split windows
unbind -
unbind =
bind - split-window -v -c "#{pane_current_path}"
bind = split-window -h -c "#{pane_current_path}"

bind -n M-h previous-window
bind -n M-l next-window

# ---------------- popup config -------------------------

# 使用 Prefix + g 打开 lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "fish -c lazygit"

# 使用 Prefix + t 打开新窗口(fish 支持ctrl+d 直接退出)
# 类似于neovim中的toggleterm插件效果.
bind t display-popup -d "#{pane_current_path}" -w 60% -h 60%  -E "fish"

# prefix + N : new session
bind N command-prompt -p "session name:" "new-session -s '%%'"

# command-prompt 的颜色由 message-style 控制,继承终端颜色
set -g message-style 'bg=default,fg=default'

# ---------------- Visual settings --------------------
# Status bar

set -g @bg  "default"
set -g @red "#fb4934"
set-option -g status-justify centre
set-option -g status-style "bg=#{@bg}"
set-option -g status-left "#[bg=#{@bg},bold] #S "
set-option -g status-left-length 50
set-option -g status-left-style default
set-option -g status-right "#[bold]%Y-%m-%d %H:%M "
set-option -g status-right-length 50
set-option -g status-right-style default

set-option -g window-status-format "#[bold] #I:#W "
set-option -g window-status-current-format "#[bold] #I:#W "
set-option -g window-status-current-style "bg=#{@bg},fg=#{@red}"
set-option -g window-status-separator ""
set-option -g window-status-activity-style none


# ----------------- plugins --------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding
set -g @vim_navigator_prefix_mapping_clear_screen ""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
