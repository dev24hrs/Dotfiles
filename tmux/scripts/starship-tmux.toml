add_newline = false
scan_timeout = 30
command_timeout = 2000

# Pane-title friendly: dir + git (branch+status)
format = "$directory$git_branch$git_status"

[directory]
format = " [$path]($style)"
truncate_to_repo = true
truncation_length = 2
style = "bold"

[git_branch]
format = " [$symbol$branch]($style)"
truncation_length = 24
symbol = " "

[git_status]
ahead = '⇡ ${count}'
diverged = '⇕⇡ ${ahead_count}⇣ ${behind_count}'
behind = '⇣ ${count}'
