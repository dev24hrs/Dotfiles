[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = false
linemode = "mtime"
show_hidden = true
show_symlink = true
scrolloff = 5

[preview]
wrap = "yes"
tab_size = 4

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]
[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"


[plugin]
prepend_preloaders = [{ mime = "{audio,video,image}/*", run = "mediainfo" }]

prepend_previewers = [{ mime = "{audio,video,image}/*", run = "mediainfo" }]

[tasks]
image_alloc = 1073741824 # = 1024*1024*1024 = 1024MB
